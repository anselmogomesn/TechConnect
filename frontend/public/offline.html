<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechConnect - Offline</title>
  <style>
    body { margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #0a0b0e; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
    .container { max-width: 400px; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    p { color: #64748b; line-height: 1.6; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    .btn { display: inline-block; margin-top: 1.5rem; padding: 12px 24px; background: #6366f1; color: white; border-radius: 12px; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Sem conexão</h1>
    <p>Você está offline no momento.<br/>Conecte-se à internet para continuar usando a TechConnect.</p>
    <a href="/" class="btn" onclick="location.reload()">Tentar novamente</a>
  </div>
</body>
</html>
